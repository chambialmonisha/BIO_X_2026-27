<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Biology Models</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* FULLSCREEN BACKGROUND */
    .background {
        position: fixed;
        width: 100%;
        height: 100%;
        z-index: -1;
    }

    .background iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* FLOATING UI */
    .floating-ui {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
    }

    h1 {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        pointer-events: none;
        font-size: 28px;
    }

    /* BUTTON STYLE */
    button {
        position: absolute;
        padding: 15px 25px;
        border: none;
        border-radius: 15px;
        font-size: 16px;
        color: white;
        cursor: pointer;

        background: rgba(28,170,217,0.6);
        backdrop-filter: blur(6px);

        transition: 0.3s;
        pointer-events: auto;
    }

    button:hover {
        transform: scale(1.1);
        background: rgba(13,139,181,0.9);
    }

    /* DESKTOP POSITION */
    .btn1 {
        top: 60%;
        left: 20%;
    }

    .btn2 {
        top: 65%;
        right: 20%;
    }

    /* 📱 MOBILE RESPONSIVE */
    @media (max-width: 768px) {

        h1 {
            font-size: 20px;
            top: 20px;
        }

        button {
            font-size: 14px;
            padding: 12px 18px;
        }

        .btn1 {
            top: 65%;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn2 {
            top: 75%;
            left: 50%;
            transform: translateX(-50%);
        }
    }

    /* MODEL VIEW */
    .viewer {
        display: none;
        position: absolute;
        width: 100%;
        height: 100%;
        background: black;
    }

    .viewer iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        background: #2e7d32;
    }

</style>

<script>
    function showModel(model) {
        document.getElementById("homeUI").style.display = "none";
        document.getElementById("stomata").style.display = "none";
        document.getElementById("photosynthesis").style.display = "none";

        document.getElementById(model).style.display = "block";
    }

    function goBack() {
        document.getElementById("homeUI").style.display = "block";
        document.getElementById("stomata").style.display = "none";
        document.getElementById("photosynthesis").style.display = "none";
    }
</script>

</head>

<body>

<!-- 🌳 INTERACTIVE BACKGROUND -->
<div class="background">
    <iframe 
        src="https://sketchfab.com/models/c062a59612bd40e2a56cbb3082448637/embed?autostart=1&ui_controls=0&ui_infos=0"
        allow="autoplay; fullscreen; xr-spatial-tracking">
    </iframe>
</div>

<!-- FLOATING UI -->
<div id="homeUI" class="floating-ui">
    <h1>🌿 Explore Biology in 3D</h1>

    <button class="btn1" onclick="showModel('stomata')">
        🌱 Stomata
    </button>

    <button class="btn2" onclick="showModel('photosynthesis')">
        ☀️ Photosynthesis
    </button>
</div>

<!-- STOMATA -->
<div id="stomata" class="viewer">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
    <iframe src="https://sketchfab.com/models/00ffda2fc813426a9852abe6350332ca/embed?autostart=1"></iframe>
</div>

<!-- PHOTOSYNTHESIS -->
<div id="photosynthesis" class="viewer">
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
    <iframe src="https://sketchfab.com/models/447ba8d6d1b74668853fd6096ec89435/embed?autostart=1"></iframe>
</div>

</body>
</html>
